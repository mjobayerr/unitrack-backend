# Production edge — TLS termination at the origin.
#
# Topology: phone/browser --HTTPS--> Cloudflare --HTTPS--> here (443) --> api:8000
#
# Use Cloudflare SSL mode "Full (Strict)" with a Cloudflare Origin Certificate
# mounted at /etc/nginx/certs. Do NOT use "Flexible" — that leaves this hop
# (Cloudflare -> your VPS) in cleartext across the public internet, so login
# credentials and tokens travel unencrypted.

upstream unitrack_api {
    server api:8000;
}

# Everything on 80 goes to HTTPS. Cloudflare already talks 443, so this only
# catches direct hits to the origin IP.
server {
    listen 80;
    server_name api.kodewithmj.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.kodewithmj.xyz;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # A phone posts small GPS batches; this is plenty and blocks oversized bodies.
    client_max_body_size 1m;

    location / {
        proxy_pass http://unitrack_api;
        proxy_set_header Host $host;
        # Behind Cloudflare, the real client IP arrives in CF-Connecting-IP.
        # X-Forwarded-For still chains it; trust it only because Cloudflare sets it.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for /ws/* (later phases). Cloudflare proxies WS on
        # the same proxied hostname, so no separate subdomain is needed.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
